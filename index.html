<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ガチャプレス - ガチャ活ユーザーのための発売カレンダー</title>
  <meta name="description" content="ガチャガチャの新商品発売情報をチェック！発売月別・ジャンル別・価格別・メーカー別で簡単検索。ガチャ活を楽しもう！">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎰</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">🎰</div>
        <div>
          <div class="logo-text">ガチャプレス</div>
          <div class="logo-sub">Gacha Press</div>
        </div>
      </a>
      <nav class="nav">
        <a href="#" class="nav-link active">📅 カレンダー</a>
        <a href="#" class="nav-link">🔥 人気</a>
        <a href="#" class="nav-link">📝 レビュー</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1 class="hero-title">ガチャ発売カレンダー</h1>
    <p class="hero-subtitle">最新のガチャガチャ発売情報をいち早くチェック！</p>
    <div class="hero-stats" id="heroStats"></div>
  </section>

  <!-- Main Content -->
  <main class="main">

    <!-- Filter Section -->
    <div class="filter-section">
      <div class="filter-header">
        <div class="filter-title">🔎 しぼりこみ</div>
        <button class="filter-clear" onclick="clearFilters()">✕ クリア</button>
      </div>
      <div class="filter-groups">
        <div class="filter-group">
          <div class="filter-label">📅 発売月</div>
          <div class="filter-pills" id="monthPills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-label">🏷️ ジャンル</div>
          <div class="filter-pills" id="genrePills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-label">💰 価格</div>
          <div class="filter-pills" id="pricePills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-label">🏭 メーカー</div>
          <div class="filter-pills" id="makerPills"></div>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="results-info">
      <div class="results-count" id="resultsCount"></div>
      <select class="sort-select" id="sortSelect">
        <option value="month-asc">発売月（古い順）</option>
        <option value="month-desc">発売月（新しい順）</option>
        <option value="price-asc">価格（安い順）</option>
        <option value="price-desc">価格（高い順）</option>
        <option value="name">名前順</option>
      </select>
    </div>

    <!-- Card Container -->
    <div id="cardContainer"></div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">🎰 ガチャプレス</div>
      <div class="footer-text">ガチャ活ユーザーのための情報メディア</div>
      <div class="footer-links">
        <a href="#" class="footer-link">発売カレンダー</a>
        <a href="#" class="footer-link">人気ランキング</a>
        <a href="#" class="footer-link">レビュー</a>
        <a href="#" class="footer-link">お問い合わせ</a>
        <a href="#" class="footer-link">プライバシーポリシー</a>
      </div>
      <div class="footer-copy">&copy; 2026 ガチャプレス All Rights Reserved.</div>
    </div>
  </footer>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTopBtn">↑</button>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
