<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ガチャプレス - ガチャ発売カレンダー</title>
  <meta name="description" content="ガチャガチャの新商品発売情報をチェック。発売月・ジャンル・価格・メーカーで絞り込み。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x25CB;</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-mark">G</div>
        <div class="logo-text">ガチャプレス</div>
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link active">カレンダー</a>
        <a href="ranking.html" class="nav-link">ランキング</a>
      </nav>
    </div>
  </header>

  <div class="page-summary">
    <h1 class="page-title">発売カレンダー</h1>
    <div class="page-stats" id="heroStats"></div>
  </div>

  <section class="carousel-section">
    <div class="carousel-header">
      <h2 class="carousel-title">注目ランキング</h2>
      <a href="ranking.html" class="carousel-more">すべて見る</a>
    </div>
    <div class="carousel-wrapper">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
    <div class="carousel-dots" id="carouselDots"></div>
  </section>

  <div class="filter-overlay" id="filterOverlay"></div>
  <button class="filter-toggle-btn" id="filterToggleBtn">絞り込み</button>

  <main class="main">

    <div class="filter-section" id="filterSection">
      <button class="filter-close-btn" id="filterCloseBtn">&times;</button>
      <div class="filter-header">
        <div class="filter-title">絞り込み</div>
        <button class="filter-clear" onclick="clearFilters()">クリア</button>
      </div>
      <div class="filter-groups">
        <div class="filter-group">
          <div class="filter-label">発売月</div>
          <div class="filter-pills" id="monthPills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-label">ジャンル</div>
          <div class="filter-pills" id="genrePills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-label">価格帯</div>
          <div class="filter-pills" id="pricePills"></div>
        </div>
        <div class="filter-group">
          <div class="filter-label">メーカー</div>
          <div class="filter-pills" id="makerPills"></div>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="results-info">
        <div class="results-count" id="resultsCount"></div>
        <select class="sort-select" id="sortSelect">
          <option value="month-asc">発売月（古い順）</option>
          <option value="month-desc">発売月（新しい順）</option>
          <option value="price-asc">価格（安い順）</option>
          <option value="price-desc">価格（高い順）</option>
          <option value="name">名前順</option>
        </select>
      </div>
      <div id="cardContainer"></div>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">ガチャプレス</div>
      <div class="footer-text">ガチャ発売情報メディア</div>
      <div class="footer-links">
        <a href="index.html" class="footer-link">カレンダー</a>
        <a href="ranking.html" class="footer-link">ランキング</a>
      </div>
      <div class="footer-copy">&copy; 2026 ガチャプレス</div>
    </div>
  </footer>

  <button class="scroll-top" id="scrollTopBtn">&uarr;</button>

  <div class="gacha-loading-overlay" id="gachaLoading">
    <div class="gacha-scene">
      <div class="gacha-machine2">
        <div class="gm-globe">
          <div class="gm-cap" style="--c:#e05c44; --x:15px; --y:18px; --d:0s"></div>
          <div class="gm-cap" style="--c:#3d3b8e; --x:52px; --y:12px; --d:.15s"></div>
          <div class="gm-cap" style="--c:#e4a832; --x:32px; --y:42px; --d:.3s"></div>
          <div class="gm-cap" style="--c:#4a9e7e; --x:62px; --y:50px; --d:.45s"></div>
          <div class="gm-cap" style="--c:#7b6fb2; --x:20px; --y:58px; --d:.6s"></div>
        </div>
        <div class="gm-body">
          <div class="gm-slot"></div>
        </div>
        <div class="gm-handle-arm">
          <div class="gm-handle-knob"></div>
        </div>
      </div>
      <div class="gm-output">
        <div class="gm-output-capsule"></div>
      </div>
    </div>
    <div class="gacha-loading-text">ローディング中...</div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/track.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
