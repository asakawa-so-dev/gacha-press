<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カプる。 - ガチャ発売カレンダー</title>
  <meta name="description" content="ガチャガチャの新商品発売情報をチェック。発売月・ジャンル・価格・メーカーで絞り込み。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%233daae0%22/><g transform=%22translate(12,10)%22><path d=%22M20,0 A20,20 0 0,1 40,20 L0,20 A20,20 0 0,1 20,0Z%22 fill=%22%23ff7b6b%22/><path d=%22M0,20 A20,20 0 0,0 20,40 A20,20 0 0,0 40,20Z%22 fill=%22%23fff%22 opacity=%220.9%22/><ellipse cx=%2212%22 cy=%2211%22 rx=%228%22 ry=%225.5%22 fill=%22%23fff%22 opacity=%220.5%22 transform=%22rotate(-18,12,11)%22/><circle cx=%2228%22 cy=%228%22 r=%223%22 fill=%22%23fff%22 opacity=%220.35%22/></g></svg>">
  <link rel="stylesheet" href="css/style.css?v=20260318">
</head>
<body>

  <!-- Floating Navbar (scroll-aware, Framer Motion style) -->
  <nav class="floating-nav" id="floatingNav">
    <a href="index.html" class="floating-nav-link active">
      <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="fn-label">カレンダー</span>
    </a>
    <a href="ranking.html" class="floating-nav-link">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 1l2.1 4.3 4.7.7-3.4 3.3.8 4.7L8 11.7 3.8 14l.8-4.7L1.2 6l4.7-.7L8 1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      <span class="fn-label">ランキング</span>
    </a>
    <button class="floating-nav-cta" onclick="window.scrollTo({top:0,behavior:'smooth'})">
      トップへ
    </button>
  </nav>

  <header class="header">
    <div class="header-top">
      <a href="index.html" class="logo-link">
        <img src="images/logo.png" alt="カプる。" class="logo-banner-img">
      </a>
    </div>
  </header>

  <div id="homeView">
    <div class="page-summary">
      <h1 class="page-title">ホーム</h1>
      <div class="page-stats" id="heroStats"></div>
    </div>

    <section class="drop-section" id="dropSection">
      <div class="drop-card">
        <div class="drop-card-header">
          <div class="drop-card-titles">
            <h2 class="drop-card-title">注目ランキング</h2>
            <p class="drop-card-subtitle">「気になる」の集計に基づくランキング</p>
          </div>
          <div class="drop-card-nav">
            <button class="drop-nav-btn" id="dropPrev" aria-label="前へ" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="drop-nav-btn" id="dropNext" aria-label="次へ">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>
        <div class="drop-card-viewport">
          <div class="drop-card-track" id="dropTrack"></div>
        </div>
        <div class="drop-card-footer">
          <a href="ranking.html" class="drop-card-link">すべてのランキングを見る →</a>
        </div>
      </div>
    </section>

    <section class="curation-section">
      <h2 class="curation-title">特集</h2>
      <div id="curationContainer"></div>
    </section>
  </div>

  <div id="searchView">
    <div class="page-summary search-summary">
      <h1 class="page-title">探す</h1>
      <div class="page-stats" id="searchStats"></div>
    </div>

    <div class="filter-overlay" id="filterOverlay"></div>
    <button class="filter-toggle-btn" id="filterToggleBtn">絞り込み</button>

    <main class="main">
      <div class="filter-section" id="filterSection">
        <div class="filter-modal-handle"></div>
        <div class="filter-header">
          <div class="filter-title">絞り込み</div>
          <button class="filter-clear" id="filterClearBtn">条件をクリア</button>
        </div>
        <div class="filter-groups">
          <div class="filter-group">
            <div class="filter-label">発売月</div>
            <div class="filter-pills" id="monthPills"></div>
          </div>
          <div class="filter-group">
            <div class="filter-label">ジャンル</div>
            <div class="filter-pills" id="genrePills"></div>
          </div>
          <div class="filter-group">
            <div class="filter-label">価格帯</div>
            <div class="filter-pills" id="pricePills"></div>
          </div>
          <div class="filter-group">
            <div class="filter-label">メーカー</div>
            <div class="filter-pills" id="makerPills"></div>
          </div>
        </div>
        <div class="filter-modal-footer" id="filterFooter">
          <button class="filter-apply-btn" id="filterApplyBtn">表示する</button>
        </div>
      </div>

      <div class="main-content">
        <div class="search-bar">
          <svg class="search-bar-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.25" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" id="searchInput" class="search-bar-input" placeholder="商品名・メーカー・ジャンルで検索">
          <button class="search-bar-clear" id="searchClear" type="button">&times;</button>
        </div>
        <div class="results-info">
          <div class="results-count" id="resultsCount"></div>
          <select class="sort-select" id="sortSelect">
            <option value="month-asc">発売月（古い順）</option>
            <option value="month-desc">発売月（新しい順）</option>
            <option value="price-asc">価格（安い順）</option>
            <option value="price-desc">価格（高い順）</option>
            <option value="name">名前順</option>
          </select>
        </div>
        <div id="cardContainer"></div>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">カプる。</div>
      <div class="footer-text">ガチャ活メディア</div>
      <div class="footer-links">
        <a href="index.html" class="footer-link">カレンダー</a>
        <a href="ranking.html" class="footer-link">ランキング</a>
      </div>
      <div class="footer-copy">&copy; 2026 カプる。</div>
    </div>
  </footer>

  <button class="scroll-top" id="scrollTopBtn">&uarr;</button>

  <div class="gacha-loading-overlay" id="gachaLoading">
    <div class="capsule-bg-grid"></div>
    <div class="capsule-ambient"></div>
    <div class="capsule-stage">
      <div class="capsule-shadow"></div>
      <div class="capsule-wrap">
        <div class="capsule-top">
          <div class="capsule-top-shine"></div>
        </div>
        <div class="capsule-glow-seam"></div>
        <div class="capsule-bottom">
          <div class="capsule-bottom-shine"></div>
        </div>
        <div class="capsule-star">
          <div class="capsule-star-orb">✦</div>
        </div>
      </div>
      <div class="capsule-burst"></div>
    </div>
    <div class="capsule-progress">
      <div class="capsule-progress-fill"></div>
    </div>
    <div class="capsule-status">読み込み中</div>
  </div>

  <script src="js/data.js?v=20260318"></script>
  <script src="js/track.js?v=20260318"></script>
  <script src="js/app.js?v=20260318"></script>
  <script src="js/floating-nav.js?v=20260318"></script>
  <script src="js/bottom-nav.js?v=20260318"></script>
</body>
</html>
